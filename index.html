<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowDiff</title>
  <link rel="stylesheet" href="frontend/src/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prism-themes@1.9.0/themes/prism-ghcolors.min.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-main-controls">
        <input type="url" id="pr-url" placeholder="Paste GitHub PR URL (e.g. https://github.com/owner/repo/pull/123)" />
        <button id="analyze-btn">Go</button>
      </div>
      <details id="github-auth-panel" class="github-auth-panel">
        <summary id="github-auth-summary">Auth</summary>
        <div class="github-auth-content">
          <input type="password" id="github-token" placeholder="GitHub token" autocomplete="off" />
          <label class="remember-token-label">
            <input type="checkbox" id="remember-token" />
            Remember on this browser
          </label>
          <button id="clear-token-btn" type="button">Clear token</button>
          <div id="auth-status" class="auth-status" aria-live="polite"></div>
        </div>
      </details>
      <span id="status" class="status"></span>
    </header>
    <div id="loading-overlay" class="loading-overlay" aria-hidden="true">
      <div class="loading-content">
        <span class="spinner"></span>
        <span id="loading-text" class="loading-text">Fetching diff…</span>
      </div>
    </div>
    <main class="main">
      <section id="code-pane" class="pane code-pane"></section>
      <section id="flow-tree-pane" class="pane flow-tree-pane"></section>
      <section id="flow-list-pane" class="pane flow-list-pane"></section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script type="module" src="frontend/src/main.js"></script>
</body>
</html>
